version: '3.8'

services:
  # PostgreSQL database for transaction data
  postgres:
    image: postgres:15-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: frauduser
      POSTGRES_PASSWORD: fraudpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frauduser -d transactions"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-network

  # Elasticsearch for fraud alerts
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: fraud-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fraud-network

  # Kibana for visualizing fraud alerts
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: fraud-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fraud-network

  # Transaction generator (replaces Python script)
  transaction-generator:
    build:
      context: ./data
      dockerfile: Dockerfile.generator
    container_name: fraud-transaction-generator
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: transactions
      POSTGRES_USER: frauduser
      POSTGRES_PASSWORD: fraudpass123
      GENERATION_RATE: 10  # transactions per second
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraud-network

volumes:
  postgres_data:
    driver: local
  es_data:
    driver: local

networks:
  fraud-network:
    driver: bridge

